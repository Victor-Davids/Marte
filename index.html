<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="componentes.css">
    <link rel="stylesheet" href="style.css">
    <title>Marte Verde</title>
</head>
<body>

    <header>
        <nav>
            <ul class="flex">
                <li><a href="#banner" class="menu-item">Início</a></li>
                <li><a href="#food" class="menu-item">Gastronomia</a></li>
                <li><a href="#problema" class="menu-item">Problema</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="banner" class="flex">
            <h1 class="title">Inovação e Descoberta</h1>
            <p class="text">Uma jornada para o além</p>

            <div class="flex">
                <a href="#food" class="btn btn-primary">Iniciar jornada</a>
            <a href="itinerary" class="btn">Ver roteiro</a>
            </div>
        </section>

        <section id="food">
            <h2 class="title">Gastronomia</h2>

            <figure class="flex">
                <img src="./assets/images/sushi.jpg" alt="Sushi">
                <img src="./assets/images/lamen.jpg" alt="Lamen">
                <img src="./assets/images/kaiseki.jpg" alt="Kaiseki">
            </figure>
        </section>
    </main>
    
</body>
</html>
